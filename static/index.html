<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Research Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Agdasima:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- Mobile hamburger -->
    <button class="hamburger" id="hamburger" onclick="toggleSidebar()" aria-label="Open config">
        <span></span>
        <span></span>
    </button>

    <!-- Mobile overlay -->
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="layout">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <p class="config-label">Config</p>
            <input type="password" class="api-input" id="anthropic-key" placeholder="Anthropic API Key">
            <input type="password" class="api-input" id="tavily-key" placeholder="Tavily API Key">
            <button class="pill-btn test-btn" id="test-btn" onclick="testConnection()">Test Connection</button>
            <div id="test-result"></div>

            <!-- Bottom actions -->
            <div class="sidebar-footer">
                <button class="sys-design-btn" onclick="openModal('sysdesign-modal')">System Design</button>
                <button class="dev-info-btn" onclick="openModal('devinfo-modal')">
                    <canvas id="particle-cone-btn"></canvas>
                    <span class="dev-info-text">
                        <span class="dev-info-name">Saif Ahmed</span>
                        <span class="dev-info-sub">View Developer Info</span>
                    </span>
                </button>
            </div>
        </aside>

        <!-- System Design Modal -->
        <div class="modal-overlay" id="sysdesign-modal" onclick="closeModalOutside(event, 'sysdesign-modal')">
            <div class="modal-card">
                <button class="modal-close" onclick="closeModal('sysdesign-modal')">&#x2715;</button>
                <h2 class="modal-title">System Design</h2>
                <div class="modal-img-wrap">
                    <img src="/static/system-design.png" alt="System design diagram"
                         onerror="this.style.display='none'; document.getElementById('sysdesign-placeholder').style.display='flex'">
                    <div id="sysdesign-placeholder" class="img-placeholder">
                        <span>&#9670;</span>
                        <p>System design diagram coming soon</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Developer Info Modal -->
        <div class="modal-overlay" id="devinfo-modal" onclick="closeModalOutside(event, 'devinfo-modal')">
            <div class="modal-card modal-card--iframe">
                <button class="modal-close" onclick="closeModal('devinfo-modal')">&#x2715;</button>
                <iframe src="/developer" class="dev-iframe" title="Developer Info"></iframe>
            </div>
        </div>

        <!-- Main -->
        <main class="main" id="main">
            <div class="main-inner">
                <h1 class="site-title">Personal Research Agent</h1>

                <input
                    type="text"
                    id="topic-input"
                    class="topic-input"
                    placeholder="Topic You Want To Research"
                    onkeydown="handleKeyDown(event)"
                >

                <!-- Progress -->
                <div id="progress-card" style="display:none">
                    <div id="progress-log"></div>
                </div>

                <!-- Report -->
                <div id="report-card" style="display:none">
                    <div class="report-actions">
                        <button class="pill-btn" onclick="downloadReport()">Download Report</button>
                    </div>
                    <div id="report-output"></div>
                </div>
            </div>
        </main>

    </div>

    <script src="/static/app.js"></script>
</body>
</html>
