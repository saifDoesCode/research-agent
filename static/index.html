<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Research Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Agdasima:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- Mobile hamburger -->
    <button class="hamburger" id="hamburger" onclick="toggleSidebar()" aria-label="Open config">
        <span></span>
        <span></span>
    </button>

    <!-- Mobile overlay -->
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="layout">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <p class="config-label">Config</p>
            <input type="password" class="api-input" id="anthropic-key" placeholder="Anthropic API Key">
            <input type="password" class="api-input" id="tavily-key" placeholder="Tavily API Key">
        </aside>

        <!-- Main -->
        <main class="main" id="main">
            <div class="main-inner">
                <h1 class="site-title">Personal Research Agent</h1>

                <input
                    type="text"
                    id="topic-input"
                    class="topic-input"
                    placeholder="Topic You Want To Research"
                    onkeydown="handleKeyDown(event)"
                >

                <!-- Progress -->
                <div id="progress-card" style="display:none">
                    <div id="progress-log"></div>
                </div>

                <!-- Report -->
                <div id="report-card" style="display:none">
                    <div class="report-actions">
                        <button class="pill-btn" onclick="downloadReport()">Download Report</button>
                    </div>
                    <div id="report-output"></div>
                </div>
            </div>
        </main>

    </div>

    <script src="/static/app.js"></script>
</body>
</html>
